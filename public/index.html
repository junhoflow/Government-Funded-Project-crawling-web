<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#114b5f" />
    <title>정부지원사업 크롤링 웹</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="shortcut icon" href="./favicon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <h1 class="hero-title">정부지원사업 통합 WEB</h1>
        <div class="hero-actions">
          <button id="sync-button" class="primary-button">지금 동기화</button>
          <button id="open-manual-entry" class="secondary-button" type="button">
            직접 추가
          </button>
          <a id="export-link" class="excel-button" href="#"
            >현재 조건 CSV 다운로드</a
          >
        </div>
      </header>

      <section class="status-grid">
        <article class="status-card status-summary-card">
          <div class="status-summary-item">
            <span class="status-label">전체 건수</span>
            <strong id="total-count">0</strong>
          </div>
          <div class="status-summary-item">
            <span class="status-label">현재 검색 결과</span>
            <strong id="filtered-count">0</strong>
          </div>
          <div class="status-summary-item">
            <span class="status-label">마지막 동기화</span>
            <strong id="last-sync">-</strong>
          </div>
        </article>
        <article class="status-card status-sync-card">
          <span class="status-label">동기화 상태</span>
          <strong id="sync-status">대기 중</strong>
          <span id="storage-mode" class="storage-mode">지원 상태 저장소 확인 중</span>
          <div class="sync-progress">
            <div class="sync-progress-bar">
              <div id="sync-progress-fill" class="sync-progress-fill"></div>
            </div>
            <span id="sync-progress-text" class="sync-progress-text">0%</span>
          </div>
          <ul id="sync-stage-list" class="sync-stage-list"></ul>
        </article>
      </section>

      <section class="filter-panel top-filter-panel">
        <div class="filter-toggle-row">
          <div class="top-filter-grid">
            <label>
              <span>키워드</span>
              <input
                type="text"
                id="keyword"
                placeholder="공고명, 기관명, 내용 검색"
              />
            </label>
            <label>
              <span>정렬</span>
              <select id="sort">
                <option value="latest">공고일 최신순</option>
                <option value="deadline">마감일 순</option>
                <option value="title">공고명 순</option>
                <option value="source">출처 순</option>
              </select>
            </label>
          </div>
          <button id="toggle-filters" class="secondary-button" type="button">
            필터 열기
          </button>
        </div>
        <div id="advanced-filters" class="advanced-filters hidden">
          <div class="filter-grid">
            <label>
              <span>출처</span>
              <select id="source">
                <option value="">전체 출처</option>
              </select>
            </label>
            <label>
              <span>공고명</span>
              <input type="text" id="title" placeholder="공고명 검색" />
            </label>
            <label>
              <span>지역</span>
              <select id="region">
                <option value="">전체 지역</option>
              </select>
            </label>
            <label>
              <span>지원대상</span>
              <input
                type="text"
                id="applyTarget"
                placeholder="지원대상 검색"
                value="예비"
              />
            </label>
            <label>
              <span>주관기관</span>
              <input type="text" id="managingOrg" placeholder="주관기관 검색" />
            </label>
            <label>
              <span>수행기관</span>
              <input
                type="text"
                id="executingOrg"
                placeholder="수행기관 검색"
              />
            </label>
            <label>
              <span>신청기간</span>
              <input type="text" id="period" placeholder="예: 2026-03" />
            </label>
            <label>
              <span>상태</span>
              <select id="status">
                <option value="">전체 상태</option>
                <option value="scheduled">예정</option>
                <option value="ongoing" selected>모집중</option>
                <option value="closed">마감/지난공고</option>
              </select>
            </label>
            <label class="category-field">
              <span class="category-field-header">
                <span>분야</span>
                <button
                  id="clear-categories"
                  class="inline-clear-button"
                  type="button"
                >
                  전체 해제
                </button>
              </span>
              <div
                id="category"
                class="category-chips"
                aria-label="분야 필터"
              ></div>
            </label>
          </div>
          <div class="filter-actions">
            <button id="reset-filters" class="secondary-button" type="button">
              초기화
            </button>
          </div>
        </div>
      </section>

      <section class="table-panel">
        <div class="table-header">
          <div>
            <h2>지원사업 목록</h2>
            <p id="result-summary">결과를 불러오는 중입니다.</p>
          </div>
          <div class="pagination-box">
            <button id="prev-page" class="pager-button">이전</button>
            <span id="page-indicator">1 / 1</span>
            <button id="next-page" class="pager-button">다음</button>
          </div>
        </div>
        <div class="list-tabs">
          <button id="tab-open" class="tab-button is-active" type="button">
            지원사업 목록 <span id="tab-open-count"></span>
          </button>
          <button id="tab-pending" class="tab-button" type="button">
            지원예정 <span id="tab-pending-count"></span>
          </button>
          <button id="tab-completed" class="tab-button" type="button">
            지원완료 <span id="tab-completed-count"></span>
          </button>
        </div>
        <div class="table-wrap">
          <table>
            <colgroup>
              <col class="source-col" />
              <col class="title-col" />
              <col class="category-col" />
              <col class="region-col" />
              <col class="managing-col" />
              <col class="executing-col" />
              <col class="period-col" />
              <col class="status-col" />
              <col class="action-col" />
            </colgroup>
            <thead>
              <tr class="column-row">
                <th>출처</th>
                <th>공고명</th>
                <th>분야</th>
                <th>지역</th>
                <th>주관기관</th>
                <th>수행기관</th>
                <th>신청기간</th>
                <th>상태</th>
                <th>처리</th>
              </tr>
            </thead>
            <tbody id="results-body"></tbody>
          </table>
        </div>
        <div id="mobile-results" class="mobile-results"></div>
        <div class="table-footer">
          <div class="pagination-box pagination-box-bottom">
            <button id="prev-page-bottom" class="pager-button" type="button">
              이전
            </button>
            <span id="page-indicator-bottom">1 / 1</span>
            <button id="next-page-bottom" class="pager-button" type="button">
              다음
            </button>
          </div>
        </div>
      </section>
    </div>

    <div id="manual-entry-backdrop" class="manual-entry-backdrop hidden">
      <section
        class="manual-entry-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="manual-entry-title"
      >
        <div class="manual-entry-header">
          <div>
            <strong id="manual-entry-title">정부지원사업 직접 추가</strong>
            <p>직접 확인한 공고를 바로 목록에 등록합니다.</p>
          </div>
          <button
            id="close-manual-entry"
            class="inline-clear-button"
            type="button"
          >
            닫기
          </button>
        </div>
        <form id="manual-entry-form" class="manual-entry-form">
          <div class="manual-entry-grid">
            <label>
              <span>출처</span>
              <input
                id="manual-source"
                name="source"
                type="text"
                value="직접등록"
                placeholder="예: 직접등록"
              />
            </label>
            <label>
              <span>공고명</span>
              <input
                id="manual-title"
                name="title"
                type="text"
                required
                placeholder="공고명을 입력하세요"
              />
            </label>
            <label>
              <span>분야</span>
              <input
                id="manual-category"
                name="category"
                type="text"
                placeholder="예: 창업, R&D"
              />
            </label>
            <label>
              <span>지역</span>
              <input
                id="manual-region"
                name="region"
                type="text"
                placeholder="예: 전국, 서울"
              />
            </label>
            <label>
              <span>지원대상</span>
              <input
                id="manual-apply-target"
                name="applyTarget"
                type="text"
                placeholder="예: 예비창업자"
              />
            </label>
            <label>
              <span>주관기관</span>
              <input
                id="manual-managing-org"
                name="managingOrg"
                type="text"
                placeholder="주관기관"
              />
            </label>
            <label>
              <span>수행기관</span>
              <input
                id="manual-executing-org"
                name="executingOrg"
                type="text"
                placeholder="수행기관"
              />
            </label>
            <label>
              <span>상세 URL</span>
              <input
                id="manual-detail-url"
                name="detailUrl"
                type="url"
                placeholder="https://..."
              />
            </label>
            <label>
              <span>신청 시작일</span>
              <input id="manual-apply-start" name="applyStart" type="date" />
            </label>
            <label>
              <span>신청 마감일</span>
              <input id="manual-apply-end" name="applyEnd" type="date" />
            </label>
            <label class="manual-entry-full">
              <span>요약</span>
              <textarea
                id="manual-summary"
                name="summary"
                rows="4"
                placeholder="핵심 내용을 입력하세요"
              ></textarea>
            </label>
          </div>
          <div class="manual-entry-actions">
            <p id="manual-entry-feedback" class="manual-entry-feedback"></p>
            <button
              id="cancel-manual-entry"
              class="secondary-button"
              type="button"
            >
              취소
            </button>
            <button
              id="submit-manual-entry"
              class="primary-button"
              type="submit"
            >
              저장
            </button>
          </div>
        </form>
      </section>
    </div>

    <template id="row-template">
      <tr>
        <td class="source-cell"></td>
        <td class="title-cell"></td>
        <td class="category-cell"></td>
        <td class="region-cell"></td>
        <td class="managing-cell"></td>
        <td class="executing-cell"></td>
        <td class="period-cell"></td>
        <td class="status-cell"></td>
        <td class="action-cell"></td>
      </tr>
    </template>

    <template id="mobile-card-template">
      <article class="mobile-card">
        <div class="mobile-card-header">
          <div class="mobile-card-badges"></div>
          <div class="mobile-card-applied"></div>
        </div>
        <a class="mobile-card-title" target="_blank" rel="noreferrer"></a>
        <div class="mobile-card-meta"></div>
        <dl class="mobile-card-grid">
          <div>
            <dt>신청기간</dt>
            <dd class="mobile-period"></dd>
          </div>
          <div>
            <dt>지역</dt>
            <dd class="mobile-region"></dd>
          </div>
          <div>
            <dt>주관기관</dt>
            <dd class="mobile-managing"></dd>
          </div>
          <div>
            <dt>수행기관</dt>
            <dd class="mobile-executing"></dd>
          </div>
        </dl>
        <div class="mobile-card-action"></div>
      </article>
    </template>

    <script src="./config.js"></script>
    <script src="./applied-store.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
